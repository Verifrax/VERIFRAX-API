name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Build Pages artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp index.html dist/index.html
          cp 404.html dist/404.html
          cp CNAME dist/CNAME
          cp -R assets dist/assets
          if [ -d surface-preview ]; then
            cp -R surface-preview dist/surface-preview
          fi
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/CNAME
          test -f dist/assets/surface.css
          grep -Fx "api.verifrax.net" dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
