# VERIFRAX Edge Worker Configuration
# Stateless execution only — no storage, no sessions, no logs after execution

name = "verifrax-edge"
main = "release-history/v1/freeze/v2/releases/v2.1.0/index.js"
compatibility_date = "2025-01-01"
account_id = "cdc2afb98b3dd0a01a57d30ce5c24b73"

# HARD RULE: No dev endpoint exposure
workers_dev = false

# Production routes only
routes = [
  { pattern = "api.verifrax.net/*", zone_name = "verifrax.net" }
]

# EXECUTION CONSTRAINTS (enforced by architecture)
# - No KV bindings
# - No Durable Objects
# - No D1 databases
# - No R2 buckets (execution layer)
# - No Queues
# - No Analytics Engine

# Stateless execution model:
# Input → Execute → Certificate → Destroy
# No state persists beyond request lifecycle

[vars]
ENVIRONMENT = "production"
PAYMENT_REQUIRED = "true"
